<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="card">
    <h1>📰 Fake News Detector</h1>

    <textarea id="newsText" placeholder="Type or paste news here..."></textarea>

    <div class="buttons">
        <button onclick="checkNews()">Check</button>
        <button onclick="clearText()" class="clear">Clear</button>
    </div>

    <p id="loading">Checking...</p>
    <h2 id="result"></h2>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
